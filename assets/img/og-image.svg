<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1730"/>
      <stop offset="100%" stop-color="#070F22"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.85" cy="0.15" r="0.55">
      <stop offset="0%" stop-color="#D4A847" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#D4A847" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D4A847" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.1" cy="0.9" r="0.6">
      <stop offset="0%" stop-color="#1B3A7A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1B3A7A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FBF8F1" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Logo W -->
  <g transform="translate(80, 80)">
    <rect width="72" height="72" rx="16" fill="#D4A847"/>
    <text x="36" y="52" text-anchor="middle" font-family="-apple-system, Inter, sans-serif" font-weight="700" font-size="42" fill="#0B1730">W</text>
  </g>

  <!-- Wordmark -->
  <text x="172" y="132" font-family="-apple-system, Inter, sans-serif" font-weight="600" font-size="32" fill="#FBF8F1" letter-spacing="-1">
    White Sand <tspan font-style="italic" fill="#E8C66B">Funding</tspan>
  </text>

  <!-- Eyebrow -->
  <text x="80" y="280" font-family="-apple-system, Inter, sans-serif" font-weight="600" font-size="18" fill="#DFB456" letter-spacing="3">
    0% BUSINESS CREDIT · FUNDING STRATEGIST
  </text>

  <!-- Main headline -->
  <text x="80" y="370" font-family="-apple-system, Inter, sans-serif" font-weight="600" font-size="76" fill="#FBF8F1" letter-spacing="-2">
    See how much you could
  </text>
  <text x="80" y="450" font-family="-apple-system, Inter, sans-serif" font-weight="600" font-size="76" fill="#FBF8F1" letter-spacing="-2">
    receive <tspan font-style="italic" fill="#E8C66B">— in minutes.</tspan>
  </text>

  <!-- Subhead -->
  <text x="80" y="520" font-family="-apple-system, Inter, sans-serif" font-weight="400" font-size="24" fill="#FBF8F1" fill-opacity="0.72">
    Book a free 30-minute strategy call · $50K–$250K · 14–21 days
  </text>

  <!-- Bottom pill -->
  <g transform="translate(80, 560)">
    <rect width="280" height="42" rx="21" fill="#D4A847"/>
    <text x="140" y="28" text-anchor="middle" font-family="-apple-system, Inter, sans-serif" font-weight="600" font-size="16" fill="#0B1730">
      whitesandfunding.com
    </text>
  </g>
</svg>
